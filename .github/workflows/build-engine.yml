name: build-engine
on:
  push: { branches: [ main, master ] }
  workflow_dispatch: {}

jobs:
  compile:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            g++ make \
            liblua5.1-0-dev \
            libxml2-dev \
            libboost-system-dev libboost-thread-dev libboost-filesystem-dev libboost-regex-dev \
            libgmp-dev \
            libmysqlclient-dev \
            libssl-dev \
            libsqlite3-dev \
            libunwind-dev libgoogle-perftools-dev

      - name: Apply u32 patch
        run: python3 infra/u32-patch.py src/protocolgame.cpp

      - name: Compile (make)
        working-directory: src
        run: |
          mkdir -p objects
          sed -i 's/-march=native[[:space:]]*-mtune=native/-O2/' Makefile
          sed -i 's/-D__ROOT_PERMISSION__/-D__ROOT_PERMISSION__ -DOPENSSL_API_COMPAT=0x10100000L -Wno-deprecated-declarations/' Makefile
          make -j$(nproc) 2>&1 | tee /tmp/build.log | grep -iE "error:|fatal error" | head -60 || true
          test -f theotxserver && echo "BINARY OK" || (echo "===BUILD FAILED==="; exit 1)

      - name: Upload binary
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: theotxserver-linux
          path: src/theotxserver
