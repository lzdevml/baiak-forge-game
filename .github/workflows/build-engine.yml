name: build-engine
on:
  push: { branches: [ main, master ] }
  workflow_dispatch: {}

jobs:
  compile:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential g++ make autoconf automake libtool pkg-config \
            liblua5.1-0-dev \
            libxml2-dev \
            libboost-system-dev libboost-filesystem-dev libboost-thread-dev libboost-regex-dev libboost-date-time-dev \
            libmysqlclient-dev \
            libssl-dev zlib1g-dev libgmp-dev

      - name: Compile (autoconf)
        working-directory: src
        run: |
          chmod +x autogen.sh 2>/dev/null || true
          ./autogen.sh || autoreconf -vfi --warnings=none
          MYSQL_INC=$(mysql_config --include 2>/dev/null || echo "-I/usr/include/mysql")
          ./configure --enable-mysql --enable-root-permission --enable-otserv-allocator \
            CXXFLAGS="-O2 -w -fpermissive -DOPENSSL_API_COMPAT=0x10100000L $MYSQL_INC -I/usr/include/mysql -I/usr/include/lua5.1" \
            CPPFLAGS="$MYSQL_INC -I/usr/include/mysql -I/usr/include/lua5.1"
          make -j$(nproc) 2>&1 | tee /tmp/build.log | grep -iE "error:|fatal error|undefined reference" | head -100 || true
          test -f theotxserver && echo "BINARY OK" || (echo "===BUILD FAILED==="; tail -40 /tmp/build.log; exit 1)

      - name: Upload binary
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: theotxserver-linux
          path: src/theotxserver
